<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bootstrap button showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="container">
        <h1 class="text-center"> Bootstrap Button Showcase</h1>
        <h2>Basic Button</h2>
        <a class="btn btn-primary mb-4" href="#" role="button">Click Me</a>
        <h2>Bootstrap Colors on Buttons</h2>
        <a href="#" class="btn btn-primary mb-4" role="button">btn-primary</a>
        <a href="#" class="btn btn-secondary mb-4" role="button">btn-secondary</a>
        <a href="#" class="btn btn-success mb-4" role="button">btn-success</a>
        <a href="#" class="btn btn-danger mb-4" role="button">btn-danger</a>
        <a href="#" class="btn btn-warning mb-4" role="button">btn-warning</a>
        <a href="#" class="btn btn-info mb-4" role="button">btn-info</a>
        <a href="#" class="btn btn-light mb-4" role="button">btn-light</a>
        <a href="#" class="btn btn-dark mb-4" role="button">btn-dark</a>

        <h2>Button Styles</h2>
        <a href="#" class="btn btn-primary mb-4" role="button">Primary</a>
        <a href="#" class="btn btn-success mb-4" role="button">Success</a>
        <a href="#" class="btn btn-danger mb-4" role="button">Danger</a>
        <a href="#" class="btn btn-outline-primary mb-4">Primary outline</a>
        <a href="#" class="btn btn-outline-success mb-4">Success outline</a>
        <a href="#" class="btn btn-outline-danger mb-4 ">Danger outline</a>

    </div>
</body>

</html>
